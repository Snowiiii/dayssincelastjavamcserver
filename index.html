            { name: "CraftBukkit", date: "2010-12-01", url: "https://www.spigotmc.org/wiki/buildtools/" },
            { name: "Vanilla", date: "2009-05-17", url: "https://www.minecraft.net/download/server" }
        ].sort((a, b) => new Date(b.date) - new Date(a.date));

        function formatDate(isoDate) {
            return new Date(isoDate).toLocaleDateString('en-GB', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function renderTimeline() {
            const timelineElement = document.getElementById('timeline');

            if (!timelineElement) return;

            timelineElement.innerHTML = projects.map((project) => `
                <div class="timeline-event">
                    <div class="event-date">${formatDate(project.date)}</div>
                    <div class="event-title"><a href="${project.url}">${project.name}</a></div>
                </div>
            `).join('');
        }

        function updateCounter() {
            const counterElement = document.getElementById('counter');
            const dateElement = document.getElementById('last-release-date');
            const linkElement = document.getElementById('last-release-link');

            if (!counterElement) return;

            const latestProject = projects[0];
            const releaseDate = new Date(latestProject.date);
            const today = new Date();

            const diffTime = Math.abs(today - releaseDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            counterElement.textContent = diffDays;
            dateElement.textContent = formatDate(latestProject.date);
            linkElement.textContent = latestProject.name;
            linkElement.href = latestProject.url;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline();
            updateCounter();
        });
